<!doctype html><html lang=en><head><meta charset=UTF-8><meta name=viewport content='width=device-width,initial-scale=1,maximum-scale=1'><title>Forgot Password — Bargain Drop</title><style>:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--blue:#2563eb;--green:#10b981}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f8f8f8;color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}.auth-container{width:100%;max-width:400px;margin-top:50px}.logo-area{text-align:center;margin-bottom:24px}.auth-logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#e60023,#ff6b81);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;font-weight:900}.auth-logo-text{font-size:1.4rem;font-weight:900;margin-top:8px}.auth-logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.auth-logo-text .bd-d{color:#111}.auth-card{background:#fff;border-radius:16px;padding:24px;border:1px solid var(--line)}.auth-title{font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:8px}.auth-subtitle{font-size:.68rem;color:var(--muted);text-align:center;margin-bottom:20px}.form-group{margin-bottom:14px}.form-group label{display:block;font-size:.7rem;font-weight:700;margin-bottom:5px;color:var(--muted)}.form-group input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:.8rem;outline:none}.submit-btn{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer}.success-msg{background:#d1fae5;color:var(--green);padding:10px;border-radius:8px;font-size:.7rem;margin-bottom:14px;display:none}.back-link{display:block;text-align:center;margin-top:16px;font-size:.72rem;color:var(--blue);text-decoration:none;font-weight:600}</style>
</head><body><div class=auth-container><div class=logo-area><a href=/ style=text-decoration:none><div class=auth-logo-icon>BD</div></a><div class=auth-logo-text><span class=bd-b>BARGAIN</span><span class=bd-d>DROP</span></div></div><div class=auth-card><div class=auth-title>Forgot Password?</div><div class=auth-subtitle>Enter your email and we'll send you a reset link</div><div class=success-msg id=success-msg></div><div class=form-group><label>Email Address</label><input type=email id=email placeholder='you@example.com' autocomplete=email></div><button class=submit-btn onclick=handleReset()>Send Reset Link</button></div><a href=signin.html class=back-link>← Back to Sign In</a></div><script>function handleReset(){var e=document.getElementById('email').value.trim();if(!e||!e.includes('@')){alert('Please enter a valid email');return}var msg=document.getElementById('success-msg');msg.textContent='If an account exists for '+e+', a reset link has been sent.';msg.style.display='';setTimeout(function(){location.href='signin.html'},3000)}</script></body></html>
