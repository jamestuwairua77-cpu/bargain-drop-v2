function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPrice(p){return 'A$'+Number(p||0).toFixed(2)}

(function(){
  var params = new URLSearchParams(window.location.search);
  var slug = params.get('cat') || '';
  var name = params.get('name') || params.get('sub') || slug || 'Category';
  
  document.getElementById('cat-title').textContent = name;
  var grid = document.getElementById('product-grid');
  if(!grid) return;
  
  if(!slug){
    grid.innerHTML = '<div class="loading-text">No category specified</div>';
    return;
  }
  
  var prods = window.__CAT_PRODS[slug] || [];
  
  if(!prods.length){
    // Try loading from /data/<slug>.json as fallback
    grid.innerHTML = '<div class="loading-text">Loading products...</div>';
    var x = new XMLHttpRequest();
    x.open('GET', '/data/' + encodeURIComponent(slug) + '.json', true);
    x.timeout = 15000;
    x.onload = function(){
      if(x.status >= 200 && x.status < 400){
        try{ prods = JSON.parse(x.responseText); }catch(e){}
      }
      renderProds(prods);
    };
    x.onerror = function(){ renderProds([]); };
    x.send();
  } else {
    renderProds(prods);
  }
  
  function renderProds(prods){
    if(!prods || !prods.length){
      grid.innerHTML = '<div class="loading-text">No products in this category</div>';
      var td = document.getElementById('total-display');
      if(td) td.textContent = '0 products';
      return;
    }
    var td = document.getElementById('total-display');
    if(td) td.textContent = prods.length + ' products';
    grid.innerHTML = '';
    var limit = Math.min(prods.length, 50);
    for(var i = 0; i < limit; i++){
      var p = prods[i];
      var a = document.createElement('a');
      a.className = 'product-card fade-in';
      a.href = 'product.html?id=' + p.id;
      a.style.animationDelay = (i * 0.03) + 's';
      var img = p.image || (Array.isArray(p.images) ? p.images[0] : '') || '';
       var imgHtml = img
        ? '<div class="prod-img"><img src="' + (p.image || (Array.isArray(p.images)&&p.images.length&&p.images[0]) || '') + '" alt="' + esc(p.title) + '" width="200" height="200" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=prod-img-placeholder>📦</div>\'"></div>'
        : '<div class="prod-img"><div class="prod-img-placeholder">📦</div></div>';
      var priceHtml = 'A$' + (Number(p.price||0).toFixed(2));
      var pc = p.compare_at_price && p.compare_at_price > p.price ? '<span class="prod-compare">A$' + (p.compare_at_price||0).toFixed(2) + '</span>' : '';
      a.innerHTML = imgHtml + '<div class="prod-info"><div class="prod-title">' + esc(p.title) + '</div><div class="prod-price-row"><span class="prod-price">' + priceHtml + '</span>' + pc + '</div></div>';
      grid.appendChild(a);
    }
  }
})();
</script>
