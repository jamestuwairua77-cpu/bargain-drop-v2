</nav><script src="js/account.js"></script><script>
"use strict";
var prefs;
(function(){
  var user = BD.requireAuth(); if (!user) return;
  prefs = BD.prefs.get();
  var emails = [{k:'emailOrders',l:'Order Updates',d:'Receive confirmation, shipping and delivery updates'},{k:'emailPromos',l:'Promotions & Deals',d:'Exclusive discounts and promo offers'},{k:'emailNewsletter',l:'Newsletter',d:'Company news, new arrivals and more'},{k:'emailPriceDrops',l:'Price Drops',d:'Alerts when items in your wishlist drop in price'}];
  var sms = [{k:'smsOrders',l:'Order Updates',d:'Get order updates via SMS'},{k:'smsPromos',l:'Promos',d:'Promotional offers via SMS'}];
  var push = [{k:'pushOrders',l:'Order Updates',d:'Prop notifications for orders'},{k:'pushPromos',l:'Promos',d:'Prop notifications for deals'}];
  function render(arr,containerId,groupName){
    var cont = document.getElementById(containerId);
    cont.innerHTML = arr.map(function(p){
      var checked = prefs[p.k] ? 'checked' : '';
      return '<div class="list-row"><div class="mi-info"><div class="mi-label">'+p.l+'</div><div class="mi-desc">'+p.d+'</div></div><label class="toggle"><input type="checkbox" data-k="'+p.k+'" '+checked+'><span class="slider"></span></label></div>';
    }).join('');
  }
  render(emails,'email-prefs');
  render(sms,'sms-prefs');
  render(push,'push-prefs');
})();
function savePrefs(){
  var patch = {};
  document.querySelectorAll('[data-k]:checkbox').forEach(function(cb){
    patch[cb.dataset.k] = cb.checked;
  });
  BD.prefs.save(Object.assign({},prefs,patch));
  var t = document.getElementById('toast');
  t.textContent = 'Preferences saved!';
  t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}
</script>
