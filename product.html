<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Product — Bargain Drop</title>
<meta name="description" content="Shop thousands of quality products at unbeatable prices on Bargain Drop. Fast shipping, secure checkout.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://bargain-drop.online/product.html">
<meta property="og:title" content="Bargain Drop — Shop Smart, Save Big">
<meta property="og:description" content="Discover amazing deals on electronics, fashion, home goods, and more at Bargain Drop.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bargain-drop.online/">
<meta property="og:site_name" content="Bargain Drop">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Bargain Drop — Shop Smart, Save Big">
<meta name="twitter:description" content="Discover amazing deals on electronics, fashion, home goods, and more.">
<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"WebSite",
  "name":"Bargain Drop",
  "url":"https://bargain-drop.online",
  "potentialAction":{"@type":"SearchAction","target":"https://bargain-drop.online/products.html?q={search_term_string}","query-input":"required name=search_term_string"}
}
</script>
<link rel="stylesheet" href="css/product.css">
</head>
<body>
<div class="loading-overlay" id="loading-overlay"><span class="loading-text" id="loading-text">Loading...</span></div>

<div class="top-bar" id="top-bar">
  <a class="back" href="javascript:history.back()">← Back</a>
  <span class="top-bar-title" id="product-title">Product</span>
  <button id="wishlist-btn" onclick="toggleWishlist()" class="wishlist-icon" aria-label="Wishlist">♡</button>
</div>

<div class="prod-img-gallery" id="gallery-block">
  <img id="product-img" src="" alt="Product image" loading="eager" width="400" height="400" style="display:block;width:100%;height:100%;object-fit:contain">
  <div class="gallery-dots" id="gallery-dots"></div>
  <span class="gallery-count" id="gallery-count"></span>
  <button class="gallery-prev" id="gallery-prev" onclick="navigateImage(-1)">‹</button>
  <button class="gallery-next" id="gallery-next" onclick="navigateImage(1)">›</button>
</div>

<div class="prod-thumbs" id="prod-thumbs"></div>

<div class="product-info">
  <div class="rating-summary" id="rating-summary">
    <div class="stars" id="header-stars"></div>
    <span class="rating-num" id="rating-num">—</span>
    <span class="rating-count" id="rating-count" onclick="document.getElementById('reviews-section').scrollIntoView({behavior:'smooth'})">0 reviews</span>
    <span class="sold-count" id="sold-count"></span>
  </div>

  <div class="price-section" id="price-section">
    <div class="price-row">
      <span class="current-price" id="product-price">$0.00</span>
      <span class="original-price" id="original-price" style="display:none"></span>
    </div>
    <div class="savings" id="savings" style="display:none"></div>
  </div>

  <div class="variant-block" id="color-block" style="display:none">
    <div class="variant-label"><span>Color</span><span class="variant-selected" id="color-selected"></span></div>
    <div class="variant-options" id="color-options"></div>
  </div>
  <div class="variant-block" id="size-block" style="display:none">
    <div class="variant-label"><span>Size</span><span class="variant-selected" id="size-selected"></span></div>
    <div class="variant-options" id="size-options"></div>
  </div>
  <div class="variant-block" id="model-block" style="display:none">
    <div class="variant-label"><span>Model</span><span class="variant-selected" id="model-selected"></span></div>
    <div class="variant-options" id="model-options"></div>
  </div>

  <div class="qty-block">
    <span class="qty-label">Quantity</span>
    <div class="qty-control">
      <button class="qty-btn" id="qty-minus" onclick="changeQty(-1)">−</button>
      <span class="qty-value" id="qty-value">1</span>
      <button class="qty-btn" id="qty-plus" onclick="changeQty(1)">+</button>
    </div>
    <span class="stock-info" id="stock-info">● In stock</span>
  </div>

  <button class="cta-btn cta-primary" id="add-to-cart" onclick="addToCart()">Add to Cart</button>
  <button class="cta-btn cta-secondary" id="buy-now" onclick="buyNow()">Buy Now</button>
</div>

<div class="desc-block">
  <h3>Description</h3>
  <div class="desc-text" id="product-desc">Loading description...</div>
</div>

<div class="specs-section" id="specs-section">
  <h3>Specifications</h3>
  <table class="specs-table" id="specs-table">
    <tbody id="spec-table-body"></tbody>
  </table>
</div>

<div class="reviews-section" id="reviews-section">
  <h3>Customer Reviews</h3>
  <div class="review-summary-card" id="review-summary-card">
    <div class="review-big-score">
      <div class="big-num" id="big-rating">—</div>
      <div class="big-stars" id="big-stars"></div>
      <div class="big-total" id="big-total"></div>
    </div>
    <div class="review-bars" id="reviews-bars"></div>
  </div>
  <div class="review-filters" id="review-filters">
    <button class="review-filter active" data-filter="all">All</button>
    <button class="review-filter" data-filter="5">5★</button>
    <button class="review-filter" data-filter="4">4★</button>
    <button class="review-filter" data-filter="3">3★</button>
    <button class="review-filter" data-filter="2">2★</button>
    <button class="review-filter" data-filter="1">1★</button>
    <button class="review-filter" data-filter="verified">Verified</button>
  </div>
  <div class="review-sort" id="review-sort">
    <select id="review-sort-select" onchange="sortReviews()">
      <option value="most_helpful">Most Helpful</option>
      <option value="newest">Newest</option>
      <option value="stars_desc">Highest Rated</option>
      <option value="stars_asc">Lowest Rated</option>
    </select>
  </div>
  <div class="reviews-list" id="reviews-list"></div>
  <button class="load-more-btn" id="load-more-reviews" onclick="loadMoreReviews()" style="display:none">Load More Reviews</button>
</div>

<div class="related-section">
  <h3>You May Also Like</h3>
  <div class="related-grid" id="related-grid"></div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
<a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="wishlist.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="cart.html" style="position:relative"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" fill="#777"/><circle cx="20" cy="21" r="1" fill="#777"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke="#777" stroke-width="1.8" fill="none"/></svg><span id="nav-cart-count" style="position:absolute;top:-2px;right:-2px;background:#e60023;color:#fff;font-size:.55rem;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700">0</span></a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 000-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>

<script src="js/currency.js?v=2"></script>
<script src="js/product.js?v=5"></script>
<script>(function(){try{var cart=JSON.parse(localStorage.getItem("bd_cart")||"[]");var n=cart.reduce(function(s,i){return s+(i.qty||1)},0);var b=document.getElementById("nav-cart-count");if(b){b.textContent=n;b.style.display=n>0?"":"none"}}catch(e){}})();</script>
<script src="js/nav-icons.js"></script>
</body>
</html>
