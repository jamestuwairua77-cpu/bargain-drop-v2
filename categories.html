<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Categories — Bargain Drop</title>
<style>
:root{--bg:#fafaf8;--fg:#1A1A1A;--muted:#6B6B6B;--meta:#9B9B9B;--line:#F0F0F0;--lilac:#B8A9E8;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:88px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
.top-bar{display:flex;align-items:center;padding:12px 16px;background:#fff;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--line);gap:14px}
.top-bar a.back{font-size:.82rem;font-weight:700;color:var(--fg)}
.page-header{padding:20px 16px 12px}
.page-header h1{font-size:1.15rem;font-weight:800}
.page-header p{font-size:.7rem;color:var(--meta);margin-top:4px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 20px}
.cat-card{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--radius);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:transform .15s;text-decoration:none;color:inherit}
.cat-card:active{transform:scale(.97)}
.cat-img{width:56px;height:56px;border-radius:12px;overflow:hidden;flex-shrink:0;background:#f5f5f5}
.cat-img img{width:100%;height:100%;object-fit:cover}
.cat-img-placeholder{width:56px;height:56px;border-radius:12px;flex-shrink:0;background:#f0eeff;display:flex;align-items:center;justify-content:center;font-size:24px}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:.82rem;font-weight:700;line-height:1.2;margin-bottom:3px}
.cat-count{font-size:.7rem;color:var(--lilac);font-weight:600}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:6px 0 env(safe-area-inset-bottom,0)}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;font-size:.62rem;color:var(--muted);text-decoration:none;transition:color .15s}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px}
</style>
</head>
<body>
<div class="top-bar"><a class="back" href="/">← Home</a></div>
<div class="page-header"><h1>All Categories</h1><p>Browse our full catalog</p></div>
<div class="cat-grid" id="cat-grid"></div>
<nav class="bottom-nav">

<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="wishlist.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="cart.html"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" fill="#777"/><circle cx="20" cy="21" r="1" fill="#777"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke="#777" stroke-width="1.8" fill="none"/></svg>Cart</a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>

  }
  a.innerHTML=imgHtml+'<div class="cat-info"><div class="cat-name">'+name+'<\/div><div class="cat-count">Shop \u2192<\/div><\/div>';
  g.appendChild(a);
}
})();
</script>
</body>
</html>
