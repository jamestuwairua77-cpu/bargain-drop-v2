<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0,  user-scalable=no"><title>Cart — Bargain Drop</title><style>:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--green:#10b981;--blue:#2563eb}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f8f8;color:var(--fg);padding-bottom:120px}.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}.logo{display:flex;align-items:center;gap:6px;text-decoration:none}.logo-text{font-size:1.15rem;font-weight:900}.logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.logo-text .bd-d{color:#111}.logo-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e60023,#ff6b81);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:900;flex-shrink:0}.header-actions{display:flex;align-items:center;gap:14px}.header-actions a{background:0 0;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:2px;color:inherit;text-decoration:none}.cart-page{padding:16px;max-width:700px;margin:0 auto}.cart-title{font-size:1.1rem;font-weight:800;margin-bottom:16px}.cart-item{display:flex;gap:12px;padding:14px;background:#fff;border-radius:14px;border:1.5px solid var(--line);margin-bottom:10px;align-items:center}.cart-item-img{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#f0f0f0}.cart-item-info{flex:1;min-width:0}.cart-item-title{font-size:.75rem;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cart-item-price{font-size:.7rem;color:var(--muted);margin-bottom:6px}.cart-item-price{font-weight:700;font-size:.85rem}.qty-control{display:flex;align-items:center;gap:8px}.qty-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}.qty-btn:active{background:#f0f0f0}.qty-val{font-size:.8rem;font-weight:700;min-width:20px;text-align:center}.remove-btn{background:0 0;border:none;color:var(--red);font-size:.65rem;font-weight:600;cursor:pointer;padding:4px;margin-top:4px}.cart-summary{background:#fff;border-radius:14px;border:1.5px solid var(--line);padding:18px;margin-top:16px}.summary-row{display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:8px;color:var(--muted)}.summary-row.total{font-size:.9rem;font-weight:800;color:var(--fg);border-top:1px solid var(--line);padding-top:12px;margin-top:8px;margin-bottom:0}.checkout-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#e60023,#ff4757);color:#fff;border:none;border-radius:12px;font-size:.82rem;font-weight:800;cursor:pointer;margin-top:14px;text-align:center;text-decoration:none;transition:opacity .15s}.checkout-btn:active{opacity:.85}.empty-cart{text-align:center;padding:60px 20px;color:var(--muted)}.empty-cart-icon{font-size:4rem;margin-bottom:16px}.empty-cart p{font-size:.85rem;margin-bottom:16px}.shop-now-btn{display:inline-block;padding:12px 28px;background:#111;color:#fff;border-radius:10px;font-weight:700;font-size:.78rem;text-decoration:none}.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0 env(safe-area-inset-bottom,0)}.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.58rem;color:var(--muted);text-decoration:none}.bottom-nav a.active{color:var(--fg)}.nav-icon{width:20px;height:20px}</style>  
<script src="js/currency.js"></script>
</head><body><div class="header"><a href="/" class="logo"><div class="logo-icon">BD</div><span class="logo-text"><span class="bd-b">BARGAIN</span><span class="bd-d">DROP</span></span></a><div class="header-actions"><a href="/"><svg width="20" height="20" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#555" stroke-width="1.8" fill="none"/></svg></a></div></div><div class="cart-page" id="cart-page"><div class="cart-title"><h1>🛒 Shopping Cart</h1></div><div id="cart-items"></div><div id="cart-summary" style="display:none"></div></div><nav class="bottom-nav">
<a href="/" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="wishlist.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="cart.html" style="position:relative"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" fill="#777"/><circle cx="20" cy="21" r="1" fill="#777"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke="#777" stroke-width="1.8" fill="none"/></svg><span id="nav-cart-count" style="position:absolute;top:-2px;right:-2px;background:#e60023;color:#fff;font-size:.55rem;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700">0</span></a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>var cart=JSON.parse(localStorage.getItem('bd_cart')||'[]');var ci=document.getElementById('cart-items');var cs=document.getElementById('cart-summary');function renderCart(){if(cart.length===0){ci.innerHTML='<div class="empty-cart"><div class="empty-cart-icon">🛒</div><p>Your cart is empty</p><a href="products.html" class="shop-now-btn">Shop Now</a></div>';cs.style.display='none';return} var h='';var subtotal=0;for(var i=0;i<cart.length;i++){var item=cart[i];var p=item.price||0;var q=item.qty||1;var lt=p*q;subtotal+=lt;h+='<div class="cart-item"><img src="'+(item.image||'https://via.placeholder.com/72')+'" class="cart-item-img" onerror="this.src=\'https://via.placeholder.com/72?text=BD\'" alt=""><div class="cart-item-info"><div class="cart-item-title">'+item.title+'</div><div class="cart-item-price">'+BD.formatMoneyCompact(p)+'</div><div class="qty-control"><button class="qty-btn" onclick="chgQty('+i+',-1)">−</button><span class="qty-val">'+q+'</span><button class="qty-btn" onclick="chgQty('+i+',1)">+</button></div><button class="remove-btn" onclick="rmItem('+i+')">Remove</button></div></div>'}var shipping=subtotal>41?0:8.44;var total=subtotal+shipping;ci.innerHTML=h;cs.style.display='';cs.innerHTML='<div class="cart-summary"><div class="summary-row"><span>Subtotal</span><span>'+BD.formatMoneyCompact(subtotal)+'</span></div><div class="summary-row"><span>Shipping</span><span>'+(shipping===0?'<span style="color:var(--green)">FREE</span>':BD.formatMoneyCompact(shipping))+'</span></div><div class="summary-row total"><span>Total</span><span>'+BD.formatMoneyCompact(total)+'</span></div><a href="checkout.html" class="checkout-btn">Proceed to Checkout</a></div>'}function chgQty(idx,amt){cart[idx].qty=(cart[idx].qty||1)+amt;if(cart[idx].qty<1)cart[idx].qty=1;saveCart()}function rmItem(idx){cart.splice(idx,1);saveCart()}function saveCart(){localStorage.setItem('bd_cart',JSON.stringify(cart));renderCart()}BD.initCurrency().then(function(){ renderCart(); });</script>


<script>
(function(){try{var cart=JSON.parse(localStorage.getItem("bd_cart")||"[]");var n=cart.reduce(function(s,i){return s+(i.qty||1)},0);var b=document.getElementById("nav-cart-count");if(b){b.textContent=n;b.style.display=n>0?"":"none"}}catch(e){}})();
</script>
</body></html>
