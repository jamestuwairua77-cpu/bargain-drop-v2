<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>All Products — Bargain Drop</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
<meta name="description" content="All products at Bargain Drop — browse our catalog of quality items at great prices.">
<link rel="canonical" href="https://bargain-drop.online/products.html">
<style>:root{--bg:#fafaf8;--fg:#1A1A1A;--muted:#6B6B6B;--meta:#9B9B9B;--line:#F0F0F0;--lilac:#B8A9E8}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);padding-bottom:88px;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}img{display:block}
.top-bar{display:flex;align-items:center;padding:12px 16px;background:#fff;position:sticky;top:0;z-index:109;border-bottom:1px solid var(--line);gap:14px}
.top-bar a.back{font-size:.82rem;font-weight:700;color:var(--fg)}
.page-header{padding:16px 16px 4px}
.page-header h1{font-size:1.1rem;font-weight:800}
.search-wrap{padding:8px 16px}
.search-box{display:flex;align-items:center;background:#f5f5f5;border-radius:9999px;padding:10px 16px;gap:8px;border:1.5px solid transparent;transition:all .15s}
.search-box:focus-within{border-color:var(--lilac);background:#fff}
.search-box svg{flex-shrink:0}
.search-box input{border:none;background:none;outline:none;flex:1;font-size:.78rem;font-family:inherit}
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px 20px}
@media(min-width:768px){.product-grid{grid-template-columns:repeat(4,1fr);max-width:1024px;margin:0 auto;gap:14px}}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:4px 16px 24px;flex-wrap:wrap}
.pagination button{padding:8px 14px;border-radius:9999px;border:1.5px solid var(--line);background:#fff;font-size:.72rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.pagination button:hover:not(:disabled){border-color:var(--meta)}
.pagination button.active{background:var(--fg);color:#fff;border-color:var(--fg)}
.pagination button:disabled{opacity:.35;cursor:not-allowed}
.pagination span{font-size:.72rem;color:var(--meta);padding:0 4px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:6px 0 env(safe-area-inset-bottom,0)}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;font-size:.62rem;color:var(--muted);text-decoration:none;transition:color .15s}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--fg)}
.nav-icon{width:20px;height:20px}
.fade-in{animation:fadeIn .35s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.loading-text{text-align:center;padding:48px;color:var(--meta);grid-column:1/-1;font-size:.85rem}

.product-card{display:block;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);text-decoration:none;color:inherit;transition:transform .15s}
.product-card:active{transform:scale(.98)}
.product-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.product-card .prod-placeholder{width:100%;aspect-ratio:1;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:36px}
.product-info{padding:8px 10px}
.product-title{font-size:.72rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:#1A1A1A}
.product-price{font-size:.85rem;font-weight:800;color:#e60023;margin-top:4px}
.prod-compare{font-size:.65rem;color:#9B9B9B;text-decoration:line-through;margin-left:4px}
</style>
</head><body>
<div class="top-bar"><a class="back" href="javascript:history.back()">← Back</a></div>
<div class="page-header"><h1>All Products</h1></div>
<div class="search-wrap"><div class="search-box"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input id="search-input" type="text" placeholder="Search products..." oninput="doSearch()"></div></div>
<div class="product-grid" id="product-grid"><div class="loading-text">Loading products...</div></div>
<div class="pagination" id="pagination"></div>
<nav class="bottom-nav">
<a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="wishlist.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="cart.html" style="position:relative"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" fill="#777"/><circle cx="20" cy="21" r="1" fill="#777"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke="#777" stroke-width="1.8" fill="none"/></svg><span id="nav-cart-count" style="position:absolute;top:-2px;right:-2px;background:#e60023;color:#fff;font-size:.55rem;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700">0</span></a>
<a href="profile.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script>function renderProductCard(p, lazy){
  var a=document.createElement("a");
  a.className="product-card fade-in";
  a.href="product.html?id="+p.id;
  var imgHtml='',priceHtml,pc='';
  var img=p.image||(Array.isArray(p.images)?p.images[0]:"")||"";
  if(img) imgHtml='<img src="'+img+'" alt="" loading="'+(lazy?"lazy":"eager")+'" onerror="this.parentElement.innerHTML=\'<div class=prod-placeholder>📦</div>\'">';
  else imgHtml='<div class="prod-placeholder">📦</div>';
  if(typeof BD!=="undefined"&&BD.formatMoneyCompact) priceHtml=BD.formatMoneyCompact(p.price||0);
  else priceHtml="A$"+(Number(p.price||0).toFixed(2));
  if(p.compare_at_price&&p.compare_at_price>p.price) pc='<span class="prod-compare">A$'+(Number(p.compare_at_price||0).toFixed(2))+'</span>';
  a.innerHTML=imgHtml+'<div class="product-info"><div class="product-title">'+esc(p.title)+'</div><div class="product-price">'+priceHtml+'</div>'+pc+'</div>';
  return a;
}

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fmtPrice(p){return "A$"+Number(p||0).toFixed(2)}

var all=[],display=[],pageSize=50,current=1;
(function loadAll(){
  var x=new XMLHttpRequest();
  x.open("GET","/data/all-products.json",true);
  x.timeout=15000;
  x.onload=function(){
    if(x.status>=200&&x.status<400){try{all=JSON.parse(x.responseText)}catch(e){all=[]};display=all.slice(0,pageSize);renderProducts()}else{showEmpty()}};
  x.onerror=function(){showEmpty()};
  x.send();
})();
function showEmpty(){document.getElementById("product-grid").innerHTML='<div class="loading-text">No products available</div>';document.getElementById("pagination").innerHTML=''}
function renderProducts(){
  var grid=document.getElementById("product-grid");
  if(!display.length){grid.innerHTML='<div class="loading-text">No products found</div>';document.getElementById("pagination").innerHTML='';return}
  grid.innerHTML='';
  for(var i=0;i<display.length;i++){grid.appendChild(renderProductCard(display[i],true))}
  renderPagination()
}
function renderPagination(){
  var p=document.getElementById("pagination"),total=Math.ceil(all.length/pageSize);
  if(total<=1){p.innerHTML='';return}
  p.innerHTML='';
  var start=Math.max(1,current-2),end=Math.min(total,current+2);
  var btn=document.createElement("button");btn.textContent='←';btn.disabled=current===1;btn.onclick=function(){current=1;navigate()};p.appendChild(btn);
  for(var i=start;i<=end;i++){var b=document.createElement("button");b.textContent=i;b.className=i===current?'active':'';b.onclick=(function(pg){return function(){current=pg;navigate()}})(i);p.appendChild(b)}
  var btn2=document.createElement("button");btn2.textContent='→';btn2.disabled=current===total;btn2.onclick=function(){current=total;navigate()};p.appendChild(btn2)
}
function navigate(){var s=(current-1)*pageSize;display=all.slice(s,s+pageSize);renderProducts();window.scrollTo({top:0,behavior:'smooth'})}
var searchTimeout;
function doSearch(){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(function(){
    var q=document.getElementById("search-input").value.toLowerCase().trim();
    if(!q){display=all.slice(0,pageSize);current=1;renderProducts();return}
    var results=all.filter(function(p){return(p.title||'').toLowerCase().indexOf(q)>=0});
    display=results.slice(0,pageSize);current=1;renderProducts()
  },300)
}
</script>
<script>(function(){try{var c=JSON.parse(localStorage.getItem("bd_cart")||"[]");var n=c.reduce(function(s,i){return s+(i.qty||1)},0);var b=document.getElementById("nav-cart-count");if(b){b.textContent=n;b.style.display=n>0?"":"none"}}catch(e){}})();</script>
<script src="js/nav-icons.js"></script>
</body></html>
