<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--green:#10b981;--shopay:#5a31f4;--apple:#000}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8f8f8;color:var(--fg);padding-bottom:80px}
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:6px;text-decoration:none}
.logo-text{font-size:1.15rem;font-weight:900}
.logo-text .bd-b{background:linear-gradient(135deg,#e60023,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-text .bd-d{color:#111}
.logo-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#e60023,#ff6b81);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:900;flex-shrink:0}
.back-link{display:flex;align-items:center;gap:4px;color:#2563eb;font-size:.75rem;font-weight:600;text-decoration:none;padding:14px 14px 0}
.checkout-wrap{padding:16px;max-width:700px;margin:0 auto}
.section-title{font-size:.82rem;font-weight:800;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.form-card{background:#fff;border-radius:14px;border:1.5px solid var(--line);padding:18px;margin-bottom:12px}
.form-row{display:flex;gap:10px;margin-bottom:12px}
.form-group{flex:1;margin-bottom:12px}
.form-group label{display:block;font-size:.65rem;font-weight:700;margin-bottom:4px;color:var(--muted)}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:.72rem;outline:none}
.summary-card{background:#fff;border-radius:14px;border:1.5px solid var(--line);padding:18px}
.summary-row{display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:8px;color:var(--muted)}
.summary-row.total{font-size:.9rem;font-weight:800;color:var(--fg);border-top:1px solid var(--line);padding-top:12px;margin-top:8px;margin-bottom:0}
.pay-btns{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.pay-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px 20px;border:none;border-radius:14px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;letter-spacing:.3px}
.pay-btn:active{transform:scale(.985)}
.pay-btn:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(1)}
.pay-btn .btn-logo{flex-shrink:0;display:flex;align-items:center}
.pay-btn .btn-text{line-height:1}
.pay-btn .btn-sub{display:block;font-size:.58rem;font-weight:500;opacity:.75;margin-top:1px}
/* Apple Pay */
.btn-applepay{background:#000;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.btn-applepay:hover{box-shadow:0 4px 16px rgba(0,0,0,.3)}
/* Google Pay */
.btn-gpay{background:#fff;color:#3c4043;border:1.5px solid #dadce0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn-gpay:hover{box-shadow:0 2px 8px rgba(0,0,0,.15);border-color:#bdc1c6}
.btn-gpay .spinner{border-color:#5f6368;border-top-color:transparent}
/* PayPal */
.btn-paypal{background:#ffc439;color:#003087;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn-paypal:hover{box-shadow:0 4px 16px rgba(0,0,0,.18);background:#f5bb2a}
.btn-paypal .spinner{border-color:#003087;border-top-color:transparent}
.pay-paypal-wrapper{width:100%}
.pay-paypal-wrapper .paypal-button{width:100%!important;border-radius:14px!important;overflow:hidden!important}
/* Stripe */
.btn-stripe{background:#635bff;color:#fff;box-shadow:0 2px 8px rgba(99,91,255,.25)}
.btn-stripe:hover{box-shadow:0 4px 16px rgba(99,91,255,.4);background:#574deb}
.pay-or{display:flex;align-items:center;gap:10px;font-size:.65rem;color:var(--muted)}
.pay-or::before,.pay-or::after{content:'';flex:1;height:1px;background:var(--line)}
.spinner{display:none;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
.pay-btn.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.pay-badges{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.pay-badge{font-size:.6rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.error-box{display:none;color:var(--red);font-size:.7rem;text-align:center;margin-top:10px;padding:10px 14px;background:#fef2f2;border-radius:8px;line-height:1.5}
.toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:12px 22px;border-radius:30px;font-size:.78rem;font-weight:600;opacity:0;transition:all .25s;z-index:300;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.pp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center}
.pp-overlay.show{display:flex}
.pp-dialog{background:#fff;border-radius:18px;padding:28px 20px 20px;max-width:380px;width:92%;position:relative;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.pp-dialog h3{font-size:.95rem;font-weight:800;margin-bottom:6px}
.pp-dialog .pp-amount{font-size:1.2rem;font-weight:800;color:var(--red);margin-bottom:16px}
.pp-dialog .pp-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1}
.pp-dialog .pp-sub{font-size:.7rem;color:var(--muted);margin-top:10px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;z-index:120;padding:4px 0 env(safe-area-inset-bottom,0)}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;font-size:.58rem;color:var(--muted);text-decoration:none}
.nav-icon{width:20px;height:20px}

<script>
var API_BASE = window.location.origin;
var STRIPE_PK='';
fetch(API_BASE+'/api/stripe-pk').then(function(r){return r.json()}).then(function(d){STRIPE_PK=d.key;}).catch(function(){});
try { BD.initCurrency().then(function(){
var cart=JSON.parse(localStorage.getItem('bd_cart')||'[]');
var subtotal=cart.reduce(function(s,i){return s+(i.price||0)*(i.qty||1)},0);
var shipping=subtotal>BD.convert(41)?0:BD.convert(8.44);
var total=subtotal+shipping;
document.getElementById('summary-subtotal').textContent=BD.formatMoneyCompact(subtotal);
document.getElementById('summary-shipping').textContent=shipping===0?'FREE':BD.formatMoneyCompact(shipping);
document.getElementById('summary-total').textContent=BD.formatMoneyCompact(total);

// --- Toast ---
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500);}

// --- Error display ---
function showError(msg){
  var el=document.getElementById('checkout-error');
  el.textContent=msg;el.style.display='block';
  setTimeout(function(){el.style.display='none'},8000);
}

// --- Shipping info ---
function getShippingInfo(){
  return {
    fname:document.getElementById('fname').value.trim(),
    lname:document.getElementById('lname').value.trim(),
    email:document.getElementById('email').value.trim(),
    addr:document.getElementById('address').value.trim(),
    city:document.getElementById('city').value.trim(),
    state:document.getElementById('state').value.trim(),
    zip:document.getElementById('zip').value.trim(),
    phone:document.getElementById('phone').value.trim()
  };
}

function validateShip(s){
  if(!s.fname||!s.lname||!s.email||!s.addr){showError('Please fill in all shipping fields');return false}
  if(!s.email.includes('@')){showError('Please enter a valid email address');return false}
  return true;
}

// --- Order saving ---
function saveOrder(oid,email,fname,lname,method){
  var order={id:oid,status:'unpaid',count:cart.length,total:total,date:new Date().toISOString(),items:cart.slice(),email:email,name:fname+' '+lname,payment:method};
  var orders=JSON.parse(localStorage.getItem('bd_orders')||'[]');orders.push(order);
  localStorage.setItem('bd_orders',JSON.stringify(orders));
  return order;
}

// --- Disable all payment buttons during processing ---
function setAllBtnsDisabled(d){
  var btns=['pay-applepay','pay-gpay','pay-stripe'];
  btns.forEach(function(id){var b=document.getElementById(id);if(b)b.disabled=d;});
}

// --- Build line items ---
function buildLineItems(){
  return cart.map(function(item){
    return {
      price_data:{
        currency:(BD.getCurrency()||'AUD').toLowerCase(),
        product_data:{name:(item.title||'Product').substring(0,200),images:item.image?[item.image]:[]},
        unit_amount:Math.round((item.price||0)*100)
      },
      quantity:item.qty||1
    };
  });
}

// Payment functions below
// --- Stripe Checkout (automatic payment methods: card + all activated in dashboard) ---
async function stripeCheckout(oid,s,pm){
  var label=pm==='paypal'?'PayPal':pm==='card'?'Card':'Stripe';
  try{
    var shipping_options=shipping>0?[{
      shipping_rate_data:{display_name:'Standard Shipping',type:'fixed_amount',
      fixed_amount:{amount:Math.round(shipping*100),currency:(BD.getCurrency()||'AUD').toLowerCase()}}
    }]:[];

    var body={
      line_items:buildLineItems(),
      customer_email:s.email,
      success_url:API_BASE+'/order-success.html?id='+oid,
      cancel_url:API_BASE+'/checkout.html',
      metadata:{order_id:oid,source:'bargain-drop-v10'},
      payment_method:pm||null,
      shipping_options:shipping_options
    };

    var resp=await fetch(API_BASE+'/api/create-checkout-session',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });

    if(!resp.ok){
      var errText='';
      try{var ed=await resp.json();errText=ed.error||JSON.stringify(ed)}catch(e){errText='Server error ('+resp.status+')'}
      throw new Error(errText);
    }

    var data=await resp.json();
    if(data.url){
      window.location.href=data.url;
    }else{
      throw new Error('No checkout URL returned');
    }
  }catch(e){
    showError(label+' failed: '+e.message+' — Please try another method');
    setAllBtnsDisabled(false);
    ['pay-applepay','pay-gpay','pay-stripe'].forEach(function(id){var b=document.getElementById(id);if(b)b.classList.remove('loading');});
  }
}

// --- PAYMENT BUTTON HANDLERS ---

window.payWithApplePay = async function(){
  if(cart.length===0){showError('Your cart is empty');return}
  var s=getShippingInfo();if(!validateShip(s))return;
  var btn=document.getElementById('pay-applepay');
  
  if(!window.ApplePaySession||!ApplePaySession.canMakePayments()){
    showError('Apple Pay requires Safari on iPhone, iPad, or Mac');
    return;
  }
  
  btn.classList.add('loading');setAllBtnsDisabled(true);
  var totalCents=Math.round(total*100);
  
  try{
    var session=new ApplePaySession(6,{
      countryCode:'AU',currencyCode:(BD.getCurrency()||'AUD'),
      supportedNetworks:['visa','masterCard','amex'],
      merchantCapabilities:['supports3DS','supportsCredit','supportsDebit','supportsEMV'],
      total:{label:'Bargain Drop',amount:(totalCents/100).toFixed(2)},
      requiredBillingContactFields:['postalAddress','name','email']
    });

    session.onvalidatemerchant=async function(ev){
      try{
        var mr=await fetch(API_BASE+'/api/apple-pay-session',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({validationURL:ev.validationURL})
        });
        var ms=await mr.json();
        session.completeMerchantValidation(ms);
      }catch(ve){session.abort();btn.classList.remove('loading');setAllBtnsDisabled(false);showError('Apple Pay merchant validation failed');}
    };

    session.onpaymentauthorized=async function(ev){
      try{
        // Send Apple Pay token to our server (ZERO Stripe.js)
        var resp=await fetch(API_BASE+'/api/apple-pay-process',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            paymentData:btoa(JSON.stringify(ev.payment.token.paymentData)),
            paymentMethod:ev.payment.token.paymentMethod,
            transactionIdentifier:ev.payment.token.transactionIdentifier,
            amount:totalCents,
            currency:(BD.getCurrency()||'AUD'),
            email:s.email
          })
        });
        var data=await resp.json();
        if(!data.success){session.completePayment(ApplePaySession.STATUS_FAILURE);throw new Error(data.error||'Payment failed')}
        session.completePayment(ApplePaySession.STATUS_SUCCESS);
        var oid='BD-AP-'+Date.now().toString(36).toUpperCase();
        saveOrder(oid,s.email,s.fname,s.lname,'Apple Pay');
        window.location.href=API_BASE+'/order-success.html?id='+oid;
      }catch(er){
        session.completePayment(ApplePaySession.STATUS_FAILURE);
        btn.classList.remove('loading');setAllBtnsDisabled(false);
        showError('Apple Pay: '+er.message);
      }
    };

    session.oncancel=function(){btn.classList.remove('loading');setAllBtnsDisabled(false)};
    session.begin();
  }catch(e){
    btn.classList.remove('loading');setAllBtnsDisabled(false);
    showError('Apple Pay error: '+e.message);
  }
};
window.payWithGPay = async function(){
  if(cart.length===0){showError('Your cart is empty');return}
  var s=getShippingInfo();if(!validateShip(s))return;
  var btn=document.getElementById('pay-gpay');
  btn.classList.add('loading');setAllBtnsDisabled(true);
  var totalCents=Math.round(total*100);

  if(typeof google==='undefined'||!google.payments||!google.payments.api){
    btn.classList.remove('loading');setAllBtnsDisabled(false);
    showError('Google Pay requires Chrome browser');
    return;
  }

  try{
    var pkResp=await fetch(API_BASE+'/api/stripe-pk');
    var pkData=await pkResp.json();
    var pubKey=pkData.key||STRIPE_PK;

    var gpayClient=new google.payments.api.PaymentsClient({environment:'PRODUCTION'});
    var gpayReq={
      apiVersion:2,apiVersionMinor:0,
      allowedPaymentMethods:[{
        type:'CARD',
        parameters:{allowedAuthMethods:['PAN_ONLY','CRYPTOGRAM_3DS'],allowedCardNetworks:['VISA','MASTERCARD','AMEX'],billingAddressRequired:true},
        tokenizationSpecification:{type:'PAYMENT_GATEWAY',parameters:{gateway:'stripe','stripe:version':'2018-11-08','stripe:publishableKey':pubKey}}
      }],
      merchantInfo:{merchantName:'Bargain Drop'},
      transactionInfo:{totalPriceStatus:'FINAL',totalPriceLabel:'Total',totalPrice:(totalCents/100).toFixed(2),currencyCode:(BD.getCurrency()||'AUD'),countryCode:'AU'}
    };

    var readyReq={apiVersion:2,apiVersionMinor:0,allowedPaymentMethods:gpayReq.allowedPaymentMethods,existingPaymentMethodRequired:false};
    var ready=await gpayClient.isReadyToPay(readyReq);
    
    if(!ready.result){
      btn.classList.remove('loading');setAllBtnsDisabled(false);
      showError('Google Pay requires a saved card in Chrome. Go to pay.google.com, add a card, then refresh.');
      return;
    }

    var paymentData=await gpayClient.loadPaymentData(gpayReq);
    var gpToken=JSON.parse(paymentData.paymentMethodData.tokenizationData.token);
    
    var resp=await fetch(API_BASE+'/api/gpay-stripe-process',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:gpToken.id,amount:totalCents,currency:(BD.getCurrency()||'AUD'),email:s.email})
    });
    var data=await resp.json();
    if(!data.success)throw new Error(data.error||'Payment failed');
    
    var oid='BD-GP-'+Date.now().toString(36).toUpperCase();
    saveOrder(oid,s.email,s.fname,s.lname,'Google Pay');
    window.location.href=API_BASE+'/order-success.html?id='+oid;

  }catch(e){
    btn.classList.remove('loading');setAllBtnsDisabled(false);
    showError('Google Pay: '+e.message);
  }
};// PayPal SDK — authentic PayPal native popup
// PayPal — SDK loaded in <head>, just render once available
(function initPayPal(){
  function renderPP(){
    if(typeof paypal==='undefined'){setTimeout(renderPP,200);return;}
    paypal.Buttons({
      style:{layout:'horizontal',color:'gold',shape:'rect',label:'paypal',height:48,tagline:false},
      onClick:function(data,actions){
        if(cart.length===0){showError('Cart is empty');return actions.reject();}
        var s=getShippingInfo();
        if(!s.fname||!s.lname||!s.email||!s.addr){showError('Fill in shipping info');return actions.reject();}
        setAllBtnsDisabled(true);
        var oid='BD-PP-'+Date.now().toString(36).toUpperCase();
        saveOrder(oid,s.email,s.fname,s.lname,'PayPal');
        window._ppOid=oid;
        return actions.resolve();
      },
      createOrder:function(data,actions){
        return actions.order.create({
          purchase_units:[{amount:{value:total.toFixed(2),currency_code:'AUD'},description:'Bargain Drop Order'}]
        });
      },
      onApprove:function(data,actions){
        return actions.order.capture().then(function(){
          window.location.href=API_BASE+'/order-success.html?id='+(window._ppOid||'');
        });
      },
      onError:function(err){setAllBtnsDisabled(false);showError('PayPal: '+(err.message||err));},
      onCancel:function(){setAllBtnsDisabled(false);}
    }).render('#paypal-btn-container');
  }
  renderPP();
})();

window.payWithStripe = async function(){
  if(cart.length===0){showError('Your cart is empty');return}
  var s=getShippingInfo();if(!validateShip(s))return;
  var btn=document.getElementById('pay-stripe');
  btn.classList.add('loading');setAllBtnsDisabled(true);
  var oid='BD-CC-'+Date.now().toString(36).toUpperCase();
  saveOrder(oid,s.email,s.fname,s.lname,'Stripe');
  await stripeCheckout(oid,s);
};
