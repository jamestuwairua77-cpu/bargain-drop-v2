<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Sign In — Bargain Drop</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#fff;--fg:#111;--muted:#777;--line:#eee;--red:#e60023;--accent:#4285F4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{width:100%;max-width:380px;padding:32px 24px;border:1px solid var(--line);border-radius:16px;text-align:center}
.auth-card h1{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.auth-card .sub{font-size:.75rem;color:var(--muted);margin-bottom:20px}
.auth-card input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:.82rem;margin-bottom:10px;outline:none;transition:border-color .15s}
.auth-card input:focus{border-color:var(--fg)}
.auth-card .primary-btn{width:100%;padding:12px;background:var(--fg);color:#fff;border:none;border-radius:10px;font-size:.84rem;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s}
.auth-card .primary-btn:disabled{opacity:.5;cursor:default}
.auth-card a{font-size:.7rem;color:var(--muted);text-decoration:underline}
.google-btn{width:100%;padding:11px 12px;background:#fff;color:#444;border:1.5px solid #ddd;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.google-btn:hover{background:#f8f8f8;border-color:#ccc}
.google-btn:disabled{opacity:.6;cursor:default}
.google-btn svg{flex-shrink:0}
.separator{display:flex;align-items:center;gap:10px;margin:16px 0 6px;color:var(--muted);font-size:.65rem}
.separator::before,.separator::after{content:'';flex:1;height:1px;background:var(--line)}
.toggle-msg{margin-top:16px;font-size:.72rem;color:var(--muted)}
.toggle-msg a{font-weight:700;color:var(--accent)}
.error-msg{color:var(--red);font-size:.72rem;margin-top:6px;display:none}
.profile-box{display:none;padding:16px;background:#f9f9f9;border-radius:12px;margin-top:16px}
.profile-box img{border-radius:50%;width:48px;height:48px}
.profile-box .name{font-weight:700;margin-top:8px;font-size:.9rem}
.profile-box .email{font-size:.72rem;color:var(--muted)}
.logout-btn{background:var(--red);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:.75rem;cursor:pointer;margin-top:10px}
.loading-dots{display:inline-flex;gap:4px}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:#fff;animation:bounce 1.4s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
#g_id_onload{display:none}
</style>

</head>
<body>
<div id="g_id_onload" 
     data-client_id="489382559871-t7hh34fgbr23vkifi1u8kd9s7dolrv20.apps.googleusercontent.com"
     data-auto_select="false"
     data-login_uri="https://bargain-drop.online/api/google-callback"
     data-cancel_on_tap_outside="false">
</div>

<div class="auth-card" id="auth-card">
  <!-- Sign In View -->
  <div id="signin-view">
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to your account</p>
    <label for="email" style="display:block;font-size:.8rem;font-weight:600;margin-bottom:4px;color:#333">Email</label><input id="email" type="email" id="signin-email" placeholder="Email" autocomplete="email">
    <label for="password" style="display:block;font-size:.8rem;font-weight:600;margin-bottom:4px;color:#333">Password</label><input id="password" type="password" id="signin-password" placeholder="Password" autocomplete="current-password">
    <div class="error-msg" id="signin-error"></div>
    <button class="primary-btn" id="signin-btn" onclick="handleSignIn()">Sign In</button>
    <div class="separator">or</div>
    <button class="google-btn" id="google-btn-signin" onclick="handleGoogleSignIn()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.95 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.88-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <p class="toggle-msg">Don't have an account? <a href="#" onclick="toggleView('register')">Register</a></p>
  </div>

  <!-- Register View -->
  <div id="register-view" style="display:none">
    <h1>Create Account</h1>
    <p class="sub">Join Bargain Drop today</p>
    <input type="text" id="reg-name" placeholder="Full Name" autocomplete="name">
    <label for="email" style="display:block;font-size:.8rem;font-weight:600;margin-bottom:4px;color:#333">Email</label><input id="email" type="email" id="reg-email" placeholder="Email" autocomplete="email">
    <label for="password" style="display:block;font-size:.8rem;font-weight:600;margin-bottom:4px;color:#333">Password</label><input id="password" type="password" id="reg-password" placeholder="Password" autocomplete="new-password">
    <div class="error-msg" id="reg-error"></div>
    <button class="primary-btn" id="reg-btn" onclick="handleRegister()">Create Account</button>
    <div class="separator">or</div>
    <button class="google-btn" id="google-btn-reg" onclick="handleGoogleSignIn()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.95 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.88-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Register with Google
    </button>
    <p class="toggle-msg">Already have an account? <a href="#" onclick="toggleView('signin')">Sign In</a></p>
  </div>

  <!-- Profile View (after login) -->
  <div id="profile-view" style="display:none">
    <h1>My Account</h1>
    <div class="profile-box">
      <img id="profile-pic" src="" alt="Profile" onerror="this.style.display='none'">
      <div class="name" id="profile-name"></div>
      <div class="email" id="profile-email"></div>
      <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
    <p style="margin-top:14px"><a href="/">← Back to Home</a></p>
  </div>

  <p style="margin-top:12px"><a href="/">← Back to Home</a></p>
</div>

<script>
var API_BASE = 'https://bargain-drop.online';  // uses canonical domain for API calls
var GOOGLE_CLIENT_ID = '489382559871-t7hh34fgbr23vkifi1u8kd9s7dolrv20.apps.googleusercontent.com';

// Check for Google auth callback
(function(){
  if(location.hash.includes('google-auth=')){
    try {
      var raw = location.hash.split('google-auth=')[1];
      var user = JSON.parse(decodeURIComponent(raw));
      saveSession(user);
      showProfile(user);
      history.replaceState(null,null,location.pathname);
    } catch(e){ console.error('Google auth parse error',e) }
  }
  var sess = JSON.parse(localStorage.getItem('bd_session')||'null');
  if(sess && sess.email){ showProfile(sess) }
})();

function toggleView(v){
  document.getElementById('signin-view').style.display = v==='register'?'none':'';
  document.getElementById('register-view').style.display = v==='register'?'':'none';
  document.getElementById('profile-view').style.display='none';
  history.replaceState(null,null,v==='register'?'register.html':'sign-in.html');
}

function showError(view,msg){
  var el = document.getElementById(view+'-error');
  el.textContent=msg;el.style.display=msg?'block':'none';
}

function setBtnLoading(id,loading){
  var btn=document.getElementById(id);
  if(loading){btn.disabled=true;btn.dataset.orig=btn.textContent;btn.innerHTML='<span class="loading-dots"><span></span><span></span><span></span></span>'}
  else{btn.disabled=false;btn.textContent=btn.dataset.orig||btn.textContent}
}

function saveSession(user){
  localStorage.setItem('bd_session',JSON.stringify(user));
  localStorage.setItem('bd_user_name',user.name||'');
  localStorage.setItem('bd_user_email',user.email||'');
  localStorage.setItem('bd_user_pic',user.picture||'');
}

function showProfile(user){
  document.getElementById('signin-view').style.display='none';
  document.getElementById('register-view').style.display='none';
  document.getElementById('profile-view').style.display='';
  document.getElementById('profile-name').textContent=user.name||'User';
  document.getElementById('profile-email').textContent=user.email||'';
  if(user.picture) document.getElementById('profile-pic').src=user.picture;
}

function handleLogout(){
  localStorage.removeItem('bd_session');
  localStorage.removeItem('bd_user_name');
  localStorage.removeItem('bd_user_email');
  localStorage.removeItem('bd_user_pic');
  document.getElementById('profile-view').style.display='none';
  document.getElementById('signin-view').style.display='';
  document.getElementById('signin-email').value='';
  document.getElementById('signin-password').value='';
}

function handleSignIn(){
  var email=document.getElementById('signin-email').value.trim();
  var pass=document.getElementById('signin-password').value;
  if(!email||!pass){showError('signin','Please fill in all fields');return}
  showError('signin','');
  setBtnLoading('signin-btn',true);
  fetch(API_BASE+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'signin',email:email,password:pass})})
    .then(function(r){return r.json()})
    .then(function(d){
      setBtnLoading('signin-btn',false);
      if(d.success){saveSession(d.user);showProfile(d.user)}
      else{showError('signin',d.error||'Sign in failed')}
    })
    .catch(function(e){setBtnLoading('signin-btn',false);showError('signin','Network error')});
}

function handleRegister(){
  var name=document.getElementById('reg-name').value.trim();
  var email=document.getElementById('reg-email').value.trim();
  var pass=document.getElementById('reg-password').value;
  if(!name||!email||!pass){showError('reg','Please fill in all fields');return}
  if(pass.length<6){showError('reg','Password must be at least 6 characters');return}
  showError('reg','');
  setBtnLoading('reg-btn',true);
  fetch(API_BASE+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'register',name:name,email:email,password:pass})})
    .then(function(r){return r.json()})
    .then(function(d){
      setBtnLoading('reg-btn',false);
      if(d.success){saveSession(d.user);showProfile(d.user)}
      else{showError('reg',d.error||'Registration failed')}
    })
    .catch(function(e){setBtnLoading('reg-btn',false);showError('reg','Network error')});
}

function handleGoogleSignIn(){
  setBtnLoading('google-btn-signin',true);
  setBtnLoading('google-btn-reg',true);
  
  // Use Google's OAuth 2.0 redirect flow directly
  var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
    'client_id=' + encodeURIComponent('489382559871-t7hh34fgbr23vkifi1u8kd9s7dolrv20.apps.googleusercontent.com') +
    '&redirect_uri=' + encodeURIComponent('https://bargain-drop.online/api/google-callback') +
    '&response_type=code' +
    '&scope=' + encodeURIComponent('openid email profile') +
    '&access_type=offline' +
    '&prompt=select_account' +
    '&state=' + encodeURIComponent('https://bargain-drop.online/profile.html');
  
  window.location.href = authUrl;
}
</script>
</body>
</html>
