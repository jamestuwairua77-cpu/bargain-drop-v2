<script src="js/account.js"></script>
<script>
var editId = null;
(function(){
  var user = BD.requireAuth(); if (!user) return;
  renderAddresses();
})();
function renderAddresses(){
  var addresses = BD.addresses.list();
  var list = document.getElementById('address-list');
  var empty = document.getElementById('empty-state');
  list.innerHTML = '';
  if (addresses.length === 0) { empty.style.display='block'; return; }
  empty.style.display='none';
  addresses.forEach(function(a){
    var row = document.createElement('div');
    row.className = 'list-row';
    row.style.cursor = 'pointer';
    row.innerHTML = '<div class="mi-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z" stroke="#333" stroke-width="1.8"/><circle cx="12" cy="10" r="3" stroke="#333" stroke-width="1.5"/></svg></div>'+
      '<div class="mi-info"><div class="mi-label">'+(a.isDefault?'ð ':'')+a.name+'</div><div class="mi-desc">'+a.street+'</div></div><span class="mi-arrow">â¨</span>';
    row.onclick = function(){ showAddEditor(a.id); };
    list.appendChild(row);
  });
}
function showAddEditor(id){
  editId = id;
  document.getElementById('modal-title').textContent = id ? 'Edit Address' : 'Add Address';
  if (id) {
    var a = BD.addresses.list().find(function(x){ return x.id === id });
    if (a) {
      document.getElementById('edit-id').value = a.id;
      document.getElementById('add-name').value = a.name || '';
      document.getElementById('add-street').value = a.street || '';
      document.getElementById('add-city').value = a.city || '';
      document.getElementById('add-zip').value = a.zip || '';
      document.getElementById('add-country').value = a.country || '';
      document.getElementById('add-phone').value = a.phone || '';
    }
  } else {
    document.getElementById('edit-id').value = '';
    document.getElementById('add-name').value = '';
    document.getElementById('add-street').value = '';
    document.getElementById('add-city').value = '';
    document.getElementById('add-zip').value = '';
    document.getElementById('add-country').value = '';
    document.getElementById('add-phone').value = '';
  }
  document.getElementById('address-modal').className = 'modal-overlay show';
}
function hideModal(){
  document.getElementById('address-modal').className = 'modal-overlay';
}
function saveAddress(){
  var data = {
    name: document.getElementById('add-name').value,
    street: document.getElementById('add-street').value,
    city: document.getElementById('add-city').value,
    zip: document.getElementById('add-zip').value,
    country: document.getElementById('add-country').value,
    phone: document.getElementById('add-phone').value
  };
  if (!data.name) return;
  if (editId) {
    BD.addresses.update(editId, data);
  } else {
    data.id = BD.uid('add');
    BD.addresses.add(data);
  }
  hideModal();
  renderAddresses();
  var t = document.getElementById('toast');
  t.textContent = editId ? 'Address updated!' : 'Address added!';
  t.className = 'toast show';
  setTimeout(function(){ t.className = 'toast'; }, 2000);
}
</script>


<script>
(function(){try{var cart=JSON.parse(localStorage.getItem("bd_cart")||"[]");var n=cart.reduce(function(s,i){return s+(i.qty||1)},0);var b=document.getElementById("nav-cart-count");if(b){b.textContent=n;b.style.display=n>0?"":"none"}}catch(e){}})();
</script>
</body>
