<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Create Account — Bargain Drop</title>
<style>
:root{--bg:#fafaf8;--fg:#1A1A1A;--muted:#6B6B6B;--line:#F0F0F0;--lilac:#B8A9E8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:20px;padding:32px 24px;max-width:400px;width:100%;box-shadow:0 2px 8px rgba(0,0,0,.08);text-align:center}
h1{font-size:1.5rem;font-weight:800;margin-bottom:8px}
p{font-size:.85rem;color:var(--muted);margin-bottom:24px;line-height:1.5}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border:1.5px solid var(--line);border-radius:14px;background:#fff;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.google-btn:hover{border-color:var(--lilac);background:#fafaff}
.back{display:inline-block;margin-top:16px;font-size:.8rem;color:var(--muted);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h1>Create Account</h1>
  <p>Join Bargain Drop to track orders, save your wishlist, and enjoy faster checkout.</p>
  <button class="google-btn" onclick="location.href='auth.html'">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign Up with Google
  </button>
  <a class="back" href="/">← Continue browsing</a>
</div>
</body>
</html>
