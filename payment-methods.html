<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Payment Methods — Bargain Drop</title>
<link rel="stylesheet" href="css/account.css">
  
</head>
<body>
<div class="top-bar"><a href="profile.html">&lsaquo; Back</a><div>Free Shipping $29+</div></div>
<div class="page-header">
  <div class="breadcrumb"><a href="profile.html">My Account</a> &rsaquo; Payment Methods</div>
  <h1>Saved Payment Methods</h1>
  <p class="subtitle">Cards, Shop Pay &amp; more</p>
</div>
<div class="section">
  <div class="card-list" id="payment-list"></div>
  <div class="empty-state" id="empty-state">
    <div class="icon">💳</div>
    <h2>No payment methods</h2>
    <p>Add a credit card or connect Shop Pay to get started.</p>
  </div>
</div>
<div class="section">
  <div class="card-list" style="padding:16px" id="payment-form">
    <strong style="font-size:.78rem;margin-bottom:12px;display:block">Add New Card</strong>
    <div class="form-group"><label>Card Number</label><input type="text" id="field-number" placeholder="4242 4242 4242 4242"></div>
    <div class="form-group"><label>Name on Card</label><input type="text" id="field-holder" placeholder="John Doe"></div>
    <div class="form-row">
      <div class="form-group"><label>Expiry</label><input type="text" id="field-expiry" placeholder="MM/YY"></div>
      <div class="form-group"><label>CVV</label><input type="text" id="field-cvv" placeholder="123"></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="addPayment()">Save Card</button>
    <p style="font-size:.65rem;color:var(--muted);margin-top:8px;text-align:center">Your card details are stored securely and never shared.</p>
  </div>
</div>
<nav class="bottom-nav">
<a href="/"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3" stroke="#777" stroke-width="2" fill="none"/></svg>Home</a>
<a href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#777" stroke-width="1.5" fill="none"/></svg>Products</a>
<a href="categories.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke="#777" stroke-width="2"/></svg>Categories</a>
<a href="wishlist.html"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="#777" stroke-width="1.5" fill="none"/></svg>Wishlist</a>
<a href="cart.html" style="position:relative"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1" fill="#777"/><circle cx="20" cy="21" r="1" fill="#777"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke="#777" stroke-width="1.8" fill="none"/></svg><span id="nav-cart-count" style="position:absolute;top:-2px;right:-2px;background:#e60023;color:#fff;font-size:.55rem;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700">0</span></a>
<a href="profile.html" class="active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="#777" stroke-width="2" fill="none"/></svg>Me</a>
</nav>
<script src="js/account.js"></script>

<script>
(function(){try{var cart=JSON.parse(localStorage.getItem("bd_cart")||"[]");var n=cart.reduce(function(s,i){return s+(i.qty||1)},0);var b=document.getElementById("nav-cart-count");if(b){b.textContent=n;b.style.display=n>0?"":"none"}}catch(e){}})();
</script>
</body>
</html>
